<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Ad 1 - Simple Cash Offer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
  .ad {
    width: 1080px;
    height: 1080px;
    position: relative;
    background: linear-gradient(165deg, #1a3a5c 0%, #0d1f33 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
  }
  /* House illustration */
  .house-container {
    position: relative;
    width: 420px;
    height: 340px;
    margin-bottom: 50px;
  }
  .house-body {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 200px;
    background: #fff;
    border-radius: 8px;
  }
  .house-roof {
    position: absolute;
    bottom: 190px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 200px solid transparent;
    border-right: 200px solid transparent;
    border-bottom: 140px solid #e8c547;
  }
  .house-door {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 70px;
    height: 110px;
    background: #1a3a5c;
    border-radius: 8px 8px 0 0;
  }
  .house-door-knob {
    position: absolute;
    top: 55px;
    right: 12px;
    width: 10px;
    height: 10px;
    background: #e8c547;
    border-radius: 50%;
  }
  .house-window {
    position: absolute;
    width: 55px;
    height: 55px;
    background: #a8d8ea;
    border: 4px solid #1a3a5c;
    border-radius: 4px;
  }
  .house-window.left { bottom: 80px; left: 35px; }
  .house-window.right { bottom: 80px; right: 35px; }
  /* Cash badge */
  .cash-badge {
    position: absolute;
    top: 20px;
    right: -10px;
    width: 120px;
    height: 120px;
    background: #27ae60;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    font-weight: 800;
    color: #fff;
    border: 5px solid #fff;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  /* Keys icon */
  .keys {
    position: absolute;
    bottom: 10px;
    left: 10px;
    font-size: 60px;
    opacity: 0.9;
  }
  /* Text */
  .main-text {
    font-size: 72px;
    font-weight: 800;
    text-align: center;
    line-height: 1.15;
    letter-spacing: -1px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .main-text .highlight {
    color: #e8c547;
  }
  .sub-text {
    font-size: 36px;
    font-weight: 400;
    text-align: center;
    opacity: 0.85;
    margin-bottom: 50px;
  }
  .cta-btn {
    background: #e8c547;
    color: #1a3a5c;
    font-size: 32px;
    font-weight: 800;
    padding: 22px 60px;
    border-radius: 50px;
    text-transform: uppercase;
    letter-spacing: 2px;
    box-shadow: 0 6px 25px rgba(232,197,71,0.4);
  }
  /* Corner accent */
  .corner-accent {
    position: absolute;
    top: 0;
    right: 0;
    width: 200px;
    height: 200px;
    background: rgba(232,197,71,0.08);
    border-radius: 0 0 0 200px;
  }
  .bottom-accent {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 300px;
    height: 100px;
    background: rgba(232,197,71,0.06);
    border-radius: 0 100px 0 0;
  }
</style>
</head>
<body>
<div class="ad">
  <div class="corner-accent"></div>
  <div class="bottom-accent"></div>

  <div class="house-container">
    <div class="house-roof"></div>
    <div class="house-body">
      <div class="house-window left"></div>
      <div class="house-window right"></div>
      <div class="house-door">
        <div class="house-door-knob"></div>
      </div>
    </div>
    <div class="cash-badge">$</div>
    <div class="keys">🔑</div>
  </div>

  <div class="main-text">
    GET A <span class="highlight">CASH OFFER</span>
  </div>
  <div class="sub-text">No Repairs Needed</div>
  <div class="cta-btn">Get Your Offer →</div>
</div>
</body>
</html>
