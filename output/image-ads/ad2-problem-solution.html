<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Ad 2 - Problem → Solution</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
  .ad {
    width: 1080px;
    height: 1080px;
    position: relative;
    display: flex;
    flex-direction: column;
    color: #fff;
  }
  /* Split screen */
  .split {
    display: flex;
    flex: 1;
  }
  .left-panel {
    width: 50%;
    background: linear-gradient(180deg, #4a1a1a 0%, #2d1010 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    position: relative;
  }
  .right-panel {
    width: 50%;
    background: linear-gradient(180deg, #1a4a2a 0%, #0d2d15 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    position: relative;
  }
  /* Divider */
  .divider {
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 140px;
    width: 4px;
    background: rgba(255,255,255,0.2);
    z-index: 2;
  }
  /* Arrow */
  .arrow {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 70px;
    height: 70px;
    background: #e8c547;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: 800;
    color: #1a1a1a;
    z-index: 3;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  /* House illustrations */
  .house-icon {
    font-size: 140px;
    margin-bottom: 30px;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
  }
  .panel-label {
    font-size: 28px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 15px;
    opacity: 0.7;
  }
  .panel-text {
    font-size: 30px;
    font-weight: 400;
    text-align: center;
    line-height: 1.4;
    opacity: 0.9;
  }
  .left-panel .panel-label { color: #ff6b6b; }
  .right-panel .panel-label { color: #51cf66; }
  /* Emoji reactions */
  .reaction {
    font-size: 60px;
    margin-top: 20px;
  }
  /* Bottom banner */
  .bottom-banner {
    height: 140px;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    padding: 0 50px;
  }
  .banner-text {
    font-size: 48px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #fff;
  }
  .banner-text .highlight {
    color: #e8c547;
  }
  /* Damaged house CSS */
  .house-damaged {
    position: relative;
    width: 200px;
    height: 180px;
    margin-bottom: 20px;
  }
  .d-roof {
    width: 0;
    height: 0;
    border-left: 120px solid transparent;
    border-right: 120px solid transparent;
    border-bottom: 80px solid #8b4513;
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%) rotate(-3deg);
  }
  .d-body {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 180px;
    height: 100px;
    background: #a0522d;
    border-radius: 4px;
  }
  .crack {
    position: absolute;
    top: 20px;
    left: 30px;
    width: 40px;
    height: 60px;
    border: 3px solid #333;
    border-radius: 2px;
    background: rgba(0,0,0,0.3);
    transform: skew(-5deg);
  }
  /* Clean house CSS */
  .house-clean {
    position: relative;
    width: 200px;
    height: 180px;
    margin-bottom: 20px;
  }
  .c-roof {
    width: 0;
    height: 0;
    border-left: 120px solid transparent;
    border-right: 120px solid transparent;
    border-bottom: 80px solid #27ae60;
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
  }
  .c-body {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 180px;
    height: 100px;
    background: #fff;
    border-radius: 4px;
  }
  .c-window {
    position: absolute;
    width: 35px;
    height: 35px;
    background: #a8d8ea;
    border: 3px solid #27ae60;
    border-radius: 3px;
  }
  .c-window.l { top: 20px; left: 20px; }
  .c-window.r { top: 20px; right: 20px; }
  .c-door {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 60px;
    background: #27ae60;
    border-radius: 4px 4px 0 0;
  }
</style>
</head>
<body>
<div class="ad">
  <div class="split">
    <div class="left-panel">
      <div class="panel-label">Before</div>
      <div class="house-damaged">
        <div class="d-roof"></div>
        <div class="d-body">
          <div class="crack"></div>
        </div>
      </div>
      <div class="panel-text">Damage. Stress.<br>No buyers.</div>
      <div class="reaction">😩</div>
    </div>
    <div class="right-panel">
      <div class="panel-label">After</div>
      <div class="house-clean">
        <div class="c-roof"></div>
        <div class="c-body">
          <div class="c-window l"></div>
          <div class="c-window r"></div>
          <div class="c-door"></div>
        </div>
      </div>
      <div class="panel-text">Cash offer.<br>Problem solved.</div>
      <div class="reaction">😌</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="arrow">→</div>
  <div class="bottom-banner">
    <div class="banner-text">WE BUY HOUSES <span class="highlight">AS-IS</span></div>
  </div>
</div>
</body>
</html>
