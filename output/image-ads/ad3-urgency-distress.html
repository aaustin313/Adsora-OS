<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Ad 3 - Urgency / Distress</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
  .ad {
    width: 1080px;
    height: 1080px;
    position: relative;
    background: linear-gradient(170deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    overflow: hidden;
  }
  /* Red warning glow */
  .warning-glow {
    position: absolute;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(231,76,60,0.15) 0%, transparent 70%);
  }
  /* Envelope / bills illustration */
  .bills-container {
    position: relative;
    width: 350px;
    height: 250px;
    margin-bottom: 50px;
  }
  .envelope {
    position: absolute;
    width: 220px;
    height: 150px;
    background: #f5f5f0;
    border-radius: 4px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .envelope::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 75px;
    background: linear-gradient(135deg, transparent 48%, #e0ddd5 48%, #e0ddd5 52%, transparent 52%),
                linear-gradient(225deg, transparent 48%, #e0ddd5 48%, #e0ddd5 52%, transparent 52%);
  }
  .envelope.e1 {
    top: 40px;
    left: 20px;
    transform: rotate(-8deg);
  }
  .envelope.e2 {
    top: 20px;
    left: 80px;
    transform: rotate(3deg);
  }
  .envelope.e3 {
    top: 50px;
    left: 60px;
    transform: rotate(-2deg);
  }
  /* Red stamp */
  .stamp {
    position: absolute;
    top: 30px;
    right: 30px;
    width: 130px;
    height: 130px;
    border: 6px solid #e74c3c;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: rotate(-15deg);
    z-index: 5;
  }
  .stamp-text {
    font-size: 22px;
    font-weight: 900;
    color: #e74c3c;
    text-align: center;
    text-transform: uppercase;
    line-height: 1.1;
  }
  /* Person silhouette */
  .person {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    font-size: 100px;
    opacity: 0.3;
  }
  /* Main text */
  .alert-text {
    font-size: 68px;
    font-weight: 900;
    text-align: center;
    line-height: 1.1;
    margin-bottom: 20px;
    text-transform: uppercase;
  }
  .alert-text .red {
    color: #e74c3c;
  }
  .sub-text {
    font-size: 34px;
    font-weight: 400;
    text-align: center;
    opacity: 0.8;
    margin-bottom: 50px;
    line-height: 1.4;
    max-width: 700px;
  }
  .cta-btn {
    background: #e74c3c;
    color: #fff;
    font-size: 30px;
    font-weight: 800;
    padding: 22px 55px;
    border-radius: 50px;
    text-transform: uppercase;
    letter-spacing: 2px;
    box-shadow: 0 6px 25px rgba(231,76,60,0.4);
  }
  /* Bottom note */
  .note {
    position: absolute;
    bottom: 30px;
    font-size: 20px;
    opacity: 0.5;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="ad">
  <div class="warning-glow"></div>

  <div class="bills-container">
    <div class="envelope e1"></div>
    <div class="envelope e2"></div>
    <div class="envelope e3"></div>
    <div class="stamp">
      <div class="stamp-text">Past<br>Due</div>
    </div>
  </div>

  <div class="alert-text">
    <span class="red">BEHIND</span> ON<br>PAYMENTS?
  </div>
  <div class="sub-text">
    You may have options.<br>Get a no-obligation cash offer.
  </div>
  <div class="cta-btn">Explore Your Options →</div>
  <div class="note">Free &bull; No obligation &bull; Confidential</div>
</div>
</body>
</html>
